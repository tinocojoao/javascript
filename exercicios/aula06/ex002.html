<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro script</title>

    <style>
        body {
            background-color: lightblue;
            color: white;
            font: normal 1em arial; /* comentario em css */
        }
        h1, p{
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.377);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1> <!--Comentario em HTML-->
    <p> Já me livrei da maldição</p>

    <script>
        var nome = window.prompt('Qual é seu nome?') // Comentario em JS
        window.alert('É um grande prazer em te conhecer, ' + nome + '!') //concatenação
    </script>
</body>
</html>
